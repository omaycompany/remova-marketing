<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="10 ISO 42001 Requirements to Map Before Building an AI Management System">
  <style>
    .eyebrow { font: 900 18px Inter, Arial, sans-serif; letter-spacing: 0; text-transform: uppercase; fill: #2563eb; }
    .title { font: 950 56px Inter, Arial, sans-serif; letter-spacing: 0; fill: #0f172a; }
    .node { font: 950 20px Inter, Arial, sans-serif; fill: #0f172a; }
    .small { font: 850 18px Inter, Arial, sans-serif; fill: #475569; }
  </style>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#e8eef6" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="70" y="76" width="1060" height="478" rx="28" fill="#ffffff" stroke="#dbe3ef" stroke-width="2" filter="url(#shadow)"/>
  <text class="eyebrow" x="112" y="132">ISO 42001 / REQUIREMENTS MAP</text>
  <text class="title" x="112" y="206">
    <tspan x="112" dy="0">10 ISO 42001 Requirements</tspan>
    <tspan x="112" dy="62">to Map Before Building an</tspan>
    <tspan x="112" dy="62">AI Management System</tspan>
  </text>
  <g transform="translate(112 416)">
    <rect width="206" height="62" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <text class="node" x="103" y="39" text-anchor="middle">Context</text>
    <path d="M 220 31 L 270 31" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
    <rect x="284" width="206" height="62" rx="18" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
    <text class="node" x="387" y="39" text-anchor="middle">Risk</text>
    <path d="M 504 31 L 554 31" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
    <rect x="568" width="206" height="62" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text class="node" x="671" y="39" text-anchor="middle">Controls</text>
    <path d="M 788 31 L 838 31" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
    <rect x="852" width="206" height="62" rx="18" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
    <text class="node" x="955" y="39" text-anchor="middle">Evidence</text>
  </g>
  <text class="small" x="112" y="542">Map requirements before implementation so controls and evidence match the AI scope.</text>
</svg>
