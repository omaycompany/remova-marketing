<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI model lifecycle governance</title>
  <desc id="desc">A lifecycle flow from proposed model to pilot, production, deprecated, and blocked states.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="50" y="46" width="1100" height="583" rx="22" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
  <text x="86" y="112" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">AI Model Lifecycle</text>
  <text x="86" y="148" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Catalog entries should move through governed states over time</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(94 252)" font-size="18" font-weight="800" text-anchor="middle">
      <rect width="170" height="118" rx="18" fill="#eff6ff" stroke="#2563eb"/>
      <text x="85" y="52" fill="#1e3a8a">Proposed</text>
      <text x="85" y="80" font-size="14" fill="#1d4ed8">Owner and use case</text>
      <g transform="translate(220 0)">
        <rect width="170" height="118" rx="18" fill="#fef3c7" stroke="#d97706"/>
        <text x="85" y="52" fill="#78350f">Pilot</text>
        <text x="85" y="80" font-size="14" fill="#92400e">Limited groups</text>
      </g>
      <g transform="translate(440 0)">
        <rect width="170" height="118" rx="18" fill="#dcfce7" stroke="#16a34a"/>
        <text x="85" y="52" fill="#14532d">Production</text>
        <text x="85" y="80" font-size="14" fill="#166534">Approved route</text>
      </g>
      <g transform="translate(660 0)">
        <rect width="170" height="118" rx="18" fill="#ede9fe" stroke="#7c3aed"/>
        <text x="85" y="52" fill="#4c1d95">Deprecated</text>
        <text x="85" y="80" font-size="14" fill="#6d28d9">Replacement named</text>
      </g>
      <g transform="translate(880 0)">
        <rect width="170" height="118" rx="18" fill="#fee2e2" stroke="#ef4444"/>
        <text x="85" y="52" fill="#7f1d1d">Blocked</text>
        <text x="85" y="80" font-size="14" fill="#991b1b">No company data</text>
      </g>
    </g>
    <g stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M274 311h40"/><path d="M304 299l18 12-18 12"/>
      <path d="M494 311h40"/><path d="M524 299l18 12-18 12"/>
      <path d="M714 311h40"/><path d="M744 299l18 12-18 12"/>
      <path d="M934 311h40"/><path d="M964 299l18 12-18 12"/>
    </g>
    <g transform="translate(130 448)" font-size="15" fill="#334155">
      <rect width="940" height="76" rx="16" fill="#f1f5f9"/>
      <text x="28" y="32" font-weight="800">Review evidence:</text>
      <text x="150" y="32">usage, incidents, latency, cost, policy events, vendor changes, user satisfaction, replacement options</text>
      <text x="28" y="58" font-weight="800">Decision:</text>
      <text x="104" y="58">expand, restrict, reroute, deprecate, block, or require new approval</text>
    </g>
  </g>
</svg>
