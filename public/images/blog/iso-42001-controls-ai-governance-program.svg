<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="13 ISO 42001 Controls Every AI Governance Program Needs">
  <style>
    .eyebrow { font: 900 18px Inter, Arial, sans-serif; letter-spacing: 0; text-transform: uppercase; fill: #2563eb; }
    .title { font: 950 58px Inter, Arial, sans-serif; letter-spacing: 0; fill: #0f172a; }
    .node { font: 950 20px Inter, Arial, sans-serif; fill: #0f172a; }
    .small { font: 850 18px Inter, Arial, sans-serif; fill: #475569; }
  </style>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#e8eef6" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="70" y="76" width="1060" height="478" rx="28" fill="#ffffff" stroke="#dbe3ef" stroke-width="2" filter="url(#shadow)"/>
  <text class="eyebrow" x="112" y="132">ISO 42001 / CONTROL SET</text>
  <text class="title" x="112" y="206">
    <tspan x="112" dy="0">13 ISO 42001 Controls</tspan>
    <tspan x="112" dy="64">Every AI Governance</tspan>
    <tspan x="112" dy="64">Program Needs</tspan>
  </text>
  <g transform="translate(112 410)">
    <rect width="172" height="58" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <text class="node" x="86" y="37" text-anchor="middle">Scope</text>
    <rect x="194" width="172" height="58" rx="18" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
    <text class="node" x="280" y="37" text-anchor="middle">Inventory</text>
    <rect x="388" width="172" height="58" rx="18" fill="#f8fafc" stroke="#dbe3ef" stroke-width="2"/>
    <text class="node" x="474" y="37" text-anchor="middle">Risk</text>
    <rect x="582" width="172" height="58" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text class="node" x="668" y="37" text-anchor="middle">Evidence</text>
    <rect x="776" width="172" height="58" rx="18" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
    <text class="node" x="862" y="37" text-anchor="middle">Review</text>
  </g>
  <text class="small" x="112" y="535">Controls should map to owners, runtime decisions, evidence sources, and review cadence.</text>
</svg>
