      <rect x="744" y="208" width="156" height="86" rx="16" fill="#fef2f2" stroke="#ef4444"/><text x="822" y="258" fill="#7f1d1d">Model Output</text>
      <rect x="744" y="360" width="156" height="86" rx="16" fill="#f1f5f9" stroke="#64748b"/><text x="822" y="410" fill="#334155">Logs</text>
