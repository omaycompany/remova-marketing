<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI data artifact map</title>
  <desc id="desc">A map of AI workflow artifacts created during model use.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="50" y="46" width="1100" height="583" rx="22" fill="#fff" stroke="#dbe3ee" stroke-width="2"/>
  <text x="86" y="112" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">AI Data Artifact Map</text>
  <text x="86" y="148" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Residency follows every copy, chunk, vector, log, and output</text>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <g font-size="18" font-weight="800">
      <rect x="88" y="284" width="156" height="86" rx="16" fill="#eff6ff" stroke="#2563eb"/><text x="166" y="334" fill="#1e3a8a">Prompt</text>
