      <path d="M244 327h278"/><path d="M456 251c56 0 72 33 66 77"/><path d="M456 403c56 0 72-33 66-77"/><path d="M678 327h278"/><path d="M900 251c56 0 72 33 66 77"/><path d="M900 403c56 0 72-33 66-77"/>
