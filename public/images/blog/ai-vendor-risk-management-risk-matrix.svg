<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI vendor risk matrix</title>
  <desc id="desc">A matrix showing how data sensitivity and AI tool capability increase vendor risk.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="52" y="46" width="1096" height="583" rx="22" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
  <text x="86" y="112" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">AI Vendor Risk Matrix</text>
  <text x="86" y="148" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Risk rises as sensitive data combines with action-taking capability</text>
  <g font-family="Inter, Arial, sans-serif">
    <text x="586" y="604" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">Tool capability</text>
    <text x="102" y="391" transform="rotate(-90 102 391)" text-anchor="middle" font-size="18" font-weight="700" fill="#334155">Data sensitivity</text>
    <g transform="translate(170 188)">
      <rect width="840" height="360" rx="14" fill="#e2e8f0"/>
      <g font-size="15" font-weight="700" fill="#0f172a">
        <text x="105" y="-22" text-anchor="middle">Draft</text>
        <text x="315" y="-22" text-anchor="middle">Read files</text>
        <text x="525" y="-22" text-anchor="middle">Update records</text>
        <text x="735" y="-22" text-anchor="middle">Act externally</text>
        <text x="-18" y="54" text-anchor="end">Public</text>
        <text x="-18" y="144" text-anchor="end">Internal</text>
        <text x="-18" y="234" text-anchor="end">Confidential</text>
        <text x="-18" y="324" text-anchor="end">Regulated</text>
      </g>
      <g stroke="#ffffff" stroke-width="4">
        <rect x="0" y="0" width="210" height="90" fill="#bbf7d0"/>
        <rect x="210" y="0" width="210" height="90" fill="#bbf7d0"/>
        <rect x="420" y="0" width="210" height="90" fill="#fde68a"/>
        <rect x="630" y="0" width="210" height="90" fill="#fed7aa"/>
        <rect x="0" y="90" width="210" height="90" fill="#bbf7d0"/>
        <rect x="210" y="90" width="210" height="90" fill="#fde68a"/>
        <rect x="420" y="90" width="210" height="90" fill="#fed7aa"/>
        <rect x="630" y="90" width="210" height="90" fill="#fecaca"/>
        <rect x="0" y="180" width="210" height="90" fill="#fde68a"/>
        <rect x="210" y="180" width="210" height="90" fill="#fed7aa"/>
        <rect x="420" y="180" width="210" height="90" fill="#fecaca"/>
        <rect x="630" y="180" width="210" height="90" fill="#fca5a5"/>
        <rect x="0" y="270" width="210" height="90" fill="#fed7aa"/>
        <rect x="210" y="270" width="210" height="90" fill="#fecaca"/>
        <rect x="420" y="270" width="210" height="90" fill="#fca5a5"/>
        <rect x="630" y="270" width="210" height="90" fill="#ef4444"/>
      </g>
      <g font-size="18" font-weight="800" text-anchor="middle">
        <text x="105" y="56" fill="#14532d">Low</text><text x="315" y="56" fill="#14532d">Low</text><text x="525" y="56" fill="#92400e">Standard</text><text x="735" y="56" fill="#9a3412">Elevated</text>
        <text x="105" y="146" fill="#14532d">Low</text><text x="315" y="146" fill="#92400e">Standard</text><text x="525" y="146" fill="#9a3412">Elevated</text><text x="735" y="146" fill="#991b1b">Restricted</text>
        <text x="105" y="236" fill="#92400e">Standard</text><text x="315" y="236" fill="#9a3412">Elevated</text><text x="525" y="236" fill="#991b1b">Restricted</text><text x="735" y="236" fill="#7f1d1d">Executive</text>
        <text x="105" y="326" fill="#9a3412">Elevated</text><text x="315" y="326" fill="#991b1b">Restricted</text><text x="525" y="326" fill="#7f1d1d">Executive</text><text x="735" y="326" fill="#ffffff">Blocked</text>
      </g>
    </g>
  </g>
</svg>
