<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI analytics trust boundaries</title>
  <desc id="desc">Trust boundaries for AI analytics access.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="50" y="46" width="1100" height="583" rx="22" fill="#fff" stroke="#dbe3ee" stroke-width="2"/>
  <text x="86" y="112" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Analytics Trust Boundaries</text>
  <text x="86" y="148" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Different questions require different access depth</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="132" y="208" width="936" height="100" rx="18" fill="#dcfce7" stroke="#16a34a"/>
    <text x="172" y="250" font-size="23" font-weight="800" fill="#14532d">Broad access: aggregate metrics</text>
    <text x="172" y="280" font-size="16" fill="#334155">Adoption, cost, workflow volume, model mix, policy event totals</text>
    <rect x="212" y="338" width="776" height="100" rx="18" fill="#fef3c7" stroke="#d97706"/>
    <text x="252" y="380" font-size="23" font-weight="800" fill="#78350f">Restricted access: event metadata</text>
    <text x="252" y="410" font-size="16" fill="#334155">User, workflow, timestamp, policy trigger, data label, action</text>
    <rect x="292" y="468" width="616" height="100" rx="18" fill="#fee2e2" stroke="#ef4444"/>
    <text x="332" y="510" font-size="23" font-weight="800" fill="#7f1d1d">Approved investigation: prompt content</text>
    <text x="332" y="540" font-size="16" fill="#334155">Prompt, attachments, response, downstream output</text>
  </g>
</svg>
