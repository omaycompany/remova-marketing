<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Regional AI data routing map</title>
  <desc id="desc">A diagram showing how AI prompts, files, logs, and audit records route across regions.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="50" y="46" width="1100" height="583" rx="22" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
  <text x="86" y="112" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Region-Aware AI Routing</text>
  <text x="86" y="148" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Residency depends on every artifact created by the workflow</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="92" y="232" width="220" height="170" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="202" y="280" text-anchor="middle" font-size="23" font-weight="800" fill="#1e3a8a">User Request</text>
    <text x="202" y="314" text-anchor="middle" font-size="15" fill="#1d4ed8">Prompt, file, image,</text>
    <text x="202" y="336" text-anchor="middle" font-size="15" fill="#1d4ed8">retrieval query</text>
    <rect x="468" y="210" width="264" height="214" rx="20" fill="#0f172a"/>
    <text x="600" y="270" text-anchor="middle" font-size="25" font-weight="800" fill="#ffffff">Governance Gateway</text>
    <text x="600" y="304" text-anchor="middle" font-size="15" fill="#cbd5e1">Classify data, user, region,</text>
    <text x="600" y="326" text-anchor="middle" font-size="15" fill="#cbd5e1">model capability, retention</text>
    <g font-size="17" font-weight="800">
      <rect x="870" y="174" width="230" height="92" rx="16" fill="#dcfce7" stroke="#16a34a"/>
      <text x="985" y="216" text-anchor="middle" fill="#14532d">EU approved route</text>
      <text x="985" y="242" text-anchor="middle" font-size="14" fill="#166534">Regional model and logs</text>
      <rect x="870" y="290" width="230" height="92" rx="16" fill="#fef3c7" stroke="#d97706"/>
      <text x="985" y="332" text-anchor="middle" fill="#78350f">Global route</text>
      <text x="985" y="358" text-anchor="middle" font-size="14" fill="#92400e">Public data only</text>
      <rect x="870" y="406" width="230" height="92" rx="16" fill="#fee2e2" stroke="#ef4444"/>
      <text x="985" y="448" text-anchor="middle" fill="#7f1d1d">Private VPC route</text>
      <text x="985" y="474" text-anchor="middle" font-size="14" fill="#991b1b">Restricted data</text>
    </g>
    <g stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M312 317h142"/><path d="M444 305l18 12-18 12"/>
      <path d="M732 272c70-70 110-62 138-52"/><path d="M856 207l20 10-20 13"/>
      <path d="M732 318h138"/><path d="M858 306l18 12-18 12"/>
      <path d="M732 360c70 70 110 62 138 52"/><path d="M856 399l20 13-20 10"/>
    </g>
    <g transform="translate(106 474)" font-size="15" fill="#334155">
      <rect width="420" height="74" rx="14" fill="#f1f5f9"/>
      <text x="24" y="31" font-weight="800">Artifacts to track:</text>
      <text x="24" y="55">prompts, outputs, embeddings, safety labels, logs, analytics, support access</text>
    </g>
  </g>
</svg>
