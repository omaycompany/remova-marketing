                <text class="check" x="168" y="240"><tspan x="168" dy="0">Review retention, privacy, and contractual requirements before production use.</tspan></text>
            
                <circle cx="128" cy="280" r="17" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
