                <text class="check" x="168" y="336"><tspan x="168" dy="0">Log model route, data class, policy outcome, and exception owner.</tspan></text>
            
                <circle cx="128" cy="376" r="17" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
