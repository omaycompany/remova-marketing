                <text class="check" x="168" y="288"><tspan x="168" dy="0">Apply redaction and policy checks before sending prompts or files.</tspan></text>
            
                <circle cx="128" cy="328" r="17" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
