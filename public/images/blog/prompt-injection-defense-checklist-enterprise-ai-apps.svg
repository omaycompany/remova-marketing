<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Prompt injection defense checklist for enterprise AI apps">
  <style>
    .eyebrow { font: 900 18px Inter, Arial, sans-serif; text-transform: uppercase; fill: #2563eb; }
    .title { font: 950 58px Inter, Arial, sans-serif; fill: #0f172a; }
    .subtitle { font: 800 24px Inter, Arial, sans-serif; fill: #334155; }
    .label { font: 900 16px Inter, Arial, sans-serif; fill: #64748b; }
    .body { font: 800 22px Inter, Arial, sans-serif; fill: #334155; }
    .node { font: 950 20px Inter, Arial, sans-serif; fill: #0f172a; }
    .small { font: 800 16px Inter, Arial, sans-serif; fill: #475569; }
  </style>
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#e6edf7" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="66" y="62" width="1068" height="506" rx="28" fill="#ffffff" stroke="#dbe3ef" stroke-width="2" filter="url(#shadow)"/>
  <text class="eyebrow" x="108" y="123">Security checklist</text>
  <text class="title" x="108" y="190">Prompt Injection</text>
  <text class="title" x="108" y="253">Defense</text>
  <text class="subtitle" x="110" y="304">Protect enterprise AI apps from hostile instructions,</text>
  <text class="subtitle" x="110" y="336">tool misuse, and data exfiltration.</text>
  <rect x="108" y="388" width="260" height="58" rx="29" fill="#0f172a"/>
  <text x="135" y="424" style="font: 950 18px Inter, Arial, sans-serif; fill: #ffffff;">12 control layers</text>
  <rect x="388" y="388" width="222" height="58" rx="29" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="418" y="424" style="font: 950 18px Inter, Arial, sans-serif; fill: #047857;">Audit-ready</text>
  <g transform="translate(690 126)">
    <rect x="0" y="0" width="332" height="92" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <text class="label" x="26" y="34">UNTRUSTED INPUT</text>
    <text class="body" x="26" y="68">Email, page, file, ticket</text>
    <path d="M166 98 L166 136" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="0" y="150" width="332" height="92" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text class="label" x="26" y="184">GUARDRAIL GATE</text>
    <text class="body" x="26" y="218">Detect, strip, block, log</text>
    <path d="M166 248 L166 286" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="0" y="300" width="332" height="92" rx="18" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <text class="label" x="26" y="334">SAFE EXECUTION</text>
    <text class="body" x="26" y="368">Least privilege + review</text>
  </g>
  <g transform="translate(108 484)">
    <circle cx="16" cy="16" r="16" fill="#dbeafe"/>
    <text class="node" x="52" y="24">Separate instructions from data</text>
    <circle cx="368" cy="16" r="16" fill="#dcfce7"/>
    <text class="node" x="404" y="24">Limit tool permissions</text>
    <circle cx="704" cy="16" r="16" fill="#fee2e2"/>
    <text class="node" x="740" y="24">Log every blocked attempt</text>
  </g>
</svg>
