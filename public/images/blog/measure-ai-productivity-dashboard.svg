<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Privacy-preserving AI productivity dashboard</title>
  <desc id="desc">A dashboard showing aggregate AI productivity metrics without prompt content.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="50" y="46" width="1100" height="583" rx="22" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
  <text x="86" y="112" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">AI Productivity Dashboard</text>
  <text x="86" y="148" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Operational insight without routine prompt browsing</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(86 194)">
      <rect width="240" height="118" rx="18" fill="#eff6ff" stroke="#2563eb"/>
      <text x="24" y="42" font-size="16" font-weight="700" fill="#1d4ed8">Active AI users</text>
      <text x="24" y="86" font-size="38" font-weight="900" fill="#0f172a">4,820</text>
      <rect x="262" width="240" height="118" rx="18" fill="#ecfdf5" stroke="#16a34a"/>
      <text x="286" y="42" font-size="16" font-weight="700" fill="#15803d">Workflow completions</text>
      <text x="286" y="86" font-size="38" font-weight="900" fill="#0f172a">18.4k</text>
      <rect x="524" width="240" height="118" rx="18" fill="#fff7ed" stroke="#f97316"/>
      <text x="548" y="42" font-size="16" font-weight="700" fill="#c2410c">Cost per workflow</text>
      <text x="548" y="86" font-size="38" font-weight="900" fill="#0f172a">$0.38</text>
      <rect x="786" width="240" height="118" rx="18" fill="#fef2f2" stroke="#ef4444"/>
      <text x="810" y="42" font-size="16" font-weight="700" fill="#dc2626">Policy warning rate</text>
      <text x="810" y="86" font-size="38" font-weight="900" fill="#0f172a">2.1%</text>
    </g>
    <g transform="translate(86 348)">
      <rect width="498" height="194" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="28" y="38" font-size="20" font-weight="800" fill="#0f172a">Department trend</text>
      <rect x="40" y="78" width="390" height="18" rx="9" fill="#dbeafe"/><rect x="40" y="78" width="304" height="18" rx="9" fill="#2563eb"/><text x="446" y="93" font-size="14" fill="#475569">Sales</text>
      <rect x="40" y="116" width="390" height="18" rx="9" fill="#dcfce7"/><rect x="40" y="116" width="260" height="18" rx="9" fill="#16a34a"/><text x="446" y="131" font-size="14" fill="#475569">Support</text>
      <rect x="40" y="154" width="390" height="18" rx="9" fill="#fed7aa"/><rect x="40" y="154" width="196" height="18" rx="9" fill="#f97316"/><text x="446" y="169" font-size="14" fill="#475569">Finance</text>
      <rect x="528" width="498" height="194" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="556" y="38" font-size="20" font-weight="800" fill="#0f172a">Content access status</text>
      <circle cx="600" cy="96" r="15" fill="#16a34a"/><text x="628" y="102" font-size="16" fill="#334155">Aggregate metrics available</text>
      <circle cx="600" cy="134" r="15" fill="#d97706"/><text x="628" y="140" font-size="16" fill="#334155">Event metadata restricted</text>
      <circle cx="600" cy="172" r="15" fill="#ef4444"/><text x="628" y="178" font-size="16" fill="#334155">Prompt content requires approval</text>
    </g>
  </g>
</svg>
