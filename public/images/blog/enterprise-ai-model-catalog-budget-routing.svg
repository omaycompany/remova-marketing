<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Model budget routing</title>
  <desc id="desc">A model routing diagram showing cost-aware routing by workflow value.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="50" y="46" width="1100" height="583" rx="22" fill="#fff" stroke="#dbe3ee" stroke-width="2"/>
  <text x="86" y="112" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Budget-Aware Model Routing</text>
  <text x="86" y="148" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Route routine work efficiently and reserve frontier models for high-value tasks</text>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="456" y="188" width="288" height="102" rx="18" fill="#0f172a"/>
    <text x="600" y="230" font-size="24" font-weight="900" fill="#fff">Incoming request</text>
    <text x="600" y="260" font-size="15" fill="#cbd5e1">Classify task, data, and value</text>
    <g stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M600 290v62"/><path d="M600 352H280v54"/><path d="M600 352v54"/><path d="M600 352h320v54"/>
    </g>
    <g font-size="18" font-weight="800">
      <rect x="146" y="406" width="268" height="110" rx="18" fill="#eff6ff" stroke="#2563eb"/>
      <text x="280" y="448" fill="#1e3a8a">Routine work</text>
      <text x="280" y="476" font-size="14" fill="#334155">Summaries, rewriting, labels</text>
      <text x="280" y="500" font-size="14" fill="#334155">Default low-cost route</text>
      <rect x="466" y="406" width="268" height="110" rx="18" fill="#ecfdf5" stroke="#16a34a"/>
      <text x="600" y="448" fill="#14532d">Sensitive work</text>
      <text x="600" y="476" font-size="14" fill="#334155">Contracts and customer data</text>
      <text x="600" y="500" font-size="14" fill="#334155">Approved secure route</text>
      <rect x="786" y="406" width="268" height="110" rx="18" fill="#f5f3ff" stroke="#7c3aed"/>
      <text x="920" y="448" fill="#4c1d95">Frontier work</text>
      <text x="920" y="476" font-size="14" fill="#334155">Complex reasoning</text>
      <text x="920" y="500" font-size="14" fill="#334155">Budget approval required</text>
    </g>
  </g>
</svg>
