<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Texas AI governance evidence matrix</title>
  <desc id="desc">A control path for localized AI governance evidence.</desc>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="#ffffff"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.8"/>
  <rect x="70" y="70" width="1060" height="535" rx="26" fill="#ffffff" stroke="#d8e0ed" stroke-width="2"/>
  <text x="108" y="138" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="950" fill="#0f172a" >Texas AI Governance Evidence Matrix</text>
  <text x="110" y="178" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#475569" >Energy and Industrial: every AI request should leave usable evidence without exposing unnecessary content.</text>
  <rect x="92" y="224" width="152" height="124" rx="18" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
      <text x="168" y="294" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="950" fill="#0f172a" text-anchor="middle">User</text>
      <path d="M244 286 L288 286" stroke="#b91c1c" stroke-width="5" stroke-linecap="round"/><path d="M280 274 L296 286 L280 298" fill="none" stroke="#b91c1c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="300" y="224" width="152" height="124" rx="18" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
      <text x="376" y="294" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="950" fill="#0f172a" text-anchor="middle">Data</text>
      <path d="M452 286 L496 286" stroke="#b91c1c" stroke-width="5" stroke-linecap="round"/><path d="M488 274 L504 286 L488 298" fill="none" stroke="#b91c1c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="508" y="224" width="152" height="124" rx="18" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
      <text x="584" y="294" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="950" fill="#0f172a" text-anchor="middle">Model</text>
      <path d="M660 286 L704 286" stroke="#b91c1c" stroke-width="5" stroke-linecap="round"/><path d="M696 274 L712 286 L696 298" fill="none" stroke="#b91c1c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="716" y="224" width="152" height="124" rx="18" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
      <text x="792" y="294" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="950" fill="#0f172a" text-anchor="middle">Workflow</text>
      <path d="M868 286 L912 286" stroke="#b91c1c" stroke-width="5" stroke-linecap="round"/><path d="M904 274 L920 286 L904 298" fill="none" stroke="#b91c1c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><rect x="924" y="224" width="152" height="124" rx="18" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
      <text x="1000" y="294" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="950" fill="#0f172a" text-anchor="middle">Audit</text>
      
  <rect x="108" y="420" width="984" height="118" rx="20" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="142" y="464" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="950" fill="#b91c1c" >Control decision</text>
  <text x="142" y="500" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#334155" >Evaluate identity, data class, approved model route, allowed workflow, budget owner, and required review before the model call completes.</text>
  <text x="142" y="566" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="950" fill="#2563eb" >Evidence retained</text>
  <text x="348" y="566" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#334155" >Store policy result, redaction event, model route, exception status, spend signal, and reviewer decision for audit-ready reconstruction.</text>
</svg>