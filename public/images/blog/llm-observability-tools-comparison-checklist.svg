<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="llm observability tools implementation checklist">
        
        <style>
            .eyebrow { font: 900 18px Inter, Arial, sans-serif; letter-spacing: 0; text-transform: uppercase; fill: #2563eb; }
            .title { font: 950 58px Inter, Arial, sans-serif; letter-spacing: 0; fill: #111827; }
            .subtitle { font: 800 24px Inter, Arial, sans-serif; fill: #334155; }
            .body { font: 700 22px Inter, Arial, sans-serif; fill: #475569; }
            .small { font: 800 18px Inter, Arial, sans-serif; fill: #64748b; }
            .label { font: 900 16px Inter, Arial, sans-serif; fill: #64748b; }
            .metric { font: 950 28px Inter, Arial, sans-serif; }
            .node { font: 950 23px Inter, Arial, sans-serif; fill: #111827; }
            .check { font: 800 18px Inter, Arial, sans-serif; fill: #334155; }
        </style>
        <defs>
            <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
                <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#e8eef6" stroke-width="1"/>
            </pattern>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
                <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.13"/>
            </filter>
        </defs>
    
        <rect width="1200" height="630" fill="#ffffff"/>
        <rect width="1200" height="630" fill="url(#grid)"/>
        <rect x="70" y="70" width="1060" height="490" rx="28" fill="#ffffff" stroke="#dbe3ef" stroke-width="2" filter="url(#shadow)"/>
        <text class="eyebrow" x="112" y="126">Implementation checklist</text>
        <rect x="850" y="100" width="198" height="52" rx="26" fill="#111827"/>
        <text x="878" y="133" style="font: 950 17px Inter, Arial, sans-serif; fill: #ffffff;">Start in Remova</text>
        <text class="subtitle" x="112" y="156"><tspan x="112" dy="0">LLM Observability Tools: Comparison Guide</tspan></text>
        
                <circle cx="128" cy="196" r="17" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
                <text x="128" y="202" text-anchor="middle" style="font: 950 11px Inter, Arial, sans-serif; fill: #047857;">OK</text>
                <text class="check" x="168" y="204"><tspan x="168" dy="0">Decide which prompt and response fields may be logged.</tspan></text>
            
                <circle cx="128" cy="244" r="17" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
                <text x="128" y="250" text-anchor="middle" style="font: 950 11px Inter, Arial, sans-serif; fill: #047857;">OK</text>
                <text class="check" x="168" y="252"><tspan x="168" dy="0">Separate aggregate telemetry from sensitive content access.</tspan></text>
            
                <circle cx="128" cy="292" r="17" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
                <text x="128" y="298" text-anchor="middle" style="font: 950 11px Inter, Arial, sans-serif; fill: #047857;">OK</text>
                <text class="check" x="168" y="300"><tspan x="168" dy="0">Track latency, errors, model quality, cost, and policy events.</tspan></text>
            
                <circle cx="128" cy="340" r="17" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
                <text x="128" y="346" text-anchor="middle" style="font: 950 11px Inter, Arial, sans-serif; fill: #047857;">OK</text>
                <text class="check" x="168" y="348"><tspan x="168" dy="0">Control who can inspect raw traces and for what purpose.</tspan></text>
            
                <circle cx="128" cy="388" r="17" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
                <text x="128" y="394" text-anchor="middle" style="font: 950 11px Inter, Arial, sans-serif; fill: #047857;">OK</text>
                <text class="check" x="168" y="396"><tspan x="168" dy="0">Connect recurring trace findings to governance review.</tspan></text>
            
    </svg>