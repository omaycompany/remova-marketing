<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI residency routing decision tree</title>
  <desc id="desc">A decision tree for routing AI requests by region, data class, and model capability.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="50" y="46" width="1100" height="583" rx="22" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
  <text x="86" y="112" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Residency Routing Decision Tree</text>
  <text x="86" y="148" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Runtime policy chooses the safest permitted model path</text>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="476" y="186" width="248" height="70" rx="16" fill="#0f172a"/>
    <text x="600" y="228" font-size="21" font-weight="800" fill="#ffffff">Incoming AI request</text>
    <rect x="166" y="326" width="240" height="82" rx="16" fill="#dbeafe" stroke="#2563eb"/>
    <text x="286" y="358" font-size="19" font-weight="800" fill="#1e3a8a">Public or internal?</text>
    <text x="286" y="384" font-size="14" fill="#1d4ed8">Use approved global route</text>
    <rect x="480" y="326" width="240" height="82" rx="16" fill="#fef3c7" stroke="#d97706"/>
    <text x="600" y="358" font-size="19" font-weight="800" fill="#78350f">Regional data?</text>
    <text x="600" y="384" font-size="14" fill="#92400e">Use region-supported route</text>
    <rect x="794" y="326" width="240" height="82" rx="16" fill="#fee2e2" stroke="#ef4444"/>
    <text x="914" y="358" font-size="19" font-weight="800" fill="#7f1d1d">Restricted data?</text>
    <text x="914" y="384" font-size="14" fill="#991b1b">Private VPC or block</text>
    <g stroke="#94a3b8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M600 256v38"/><path d="M600 294H286v32"/><path d="M600 294v32"/><path d="M600 294h314v32"/>
      <path d="M286 408v54"/><path d="M600 408v54"/><path d="M914 408v54"/>
    </g>
    <g font-size="17" font-weight="800">
      <rect x="166" y="462" width="240" height="74" rx="14" fill="#eff6ff"/>
      <text x="286" y="506" fill="#1e3a8a">Fast low-cost model</text>
      <rect x="480" y="462" width="240" height="74" rx="14" fill="#fff7ed"/>
      <text x="600" y="506" fill="#78350f">Regional provider</text>
      <rect x="794" y="462" width="240" height="74" rx="14" fill="#fef2f2"/>
      <text x="914" y="506" fill="#7f1d1d">Restricted route</text>
    </g>
  </g>
</svg>
