<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Approved AI tool map</title>
  <desc id="desc">A department map showing approved, conditional, and blocked AI tools.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect x="50" y="44" width="1100" height="587" rx="22" fill="#ffffff" stroke="#dbe3ee" stroke-width="2"/>
  <text x="86" y="108" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">Approved AI Tool Map</text>
  <text x="86" y="144" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Approval decisions should be visible by department and data class</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(86 190)">
      <rect width="1028" height="72" rx="16" fill="#0f172a"/>
      <text x="36" y="45" font-size="20" font-weight="800" fill="#ffffff">Department</text>
      <text x="290" y="45" font-size="20" font-weight="800" fill="#ffffff">Approved tools</text>
      <text x="570" y="45" font-size="20" font-weight="800" fill="#ffffff">Conditional use</text>
      <text x="850" y="45" font-size="20" font-weight="800" fill="#ffffff">Blocked</text>
    </g>
    <g transform="translate(86 282)" font-size="17">
      <g>
        <rect width="1028" height="72" rx="14" fill="#f1f5f9"/>
        <text x="36" y="44" font-weight="800" fill="#0f172a">Marketing</text>
        <text x="290" y="44" fill="#166534">Brand copy assistant</text>
        <text x="570" y="44" fill="#92400e">Image generation with review</text>
        <text x="850" y="44" fill="#991b1b">Personal prompt plugins</text>
      </g>
      <g transform="translate(0 86)">
        <rect width="1028" height="72" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="36" y="44" font-weight="800" fill="#0f172a">Engineering</text>
        <text x="290" y="44" fill="#166534">Governed coding assistant</text>
        <text x="570" y="44" fill="#92400e">Repo-aware review bot</text>
        <text x="850" y="44" fill="#991b1b">Unlogged code paste sites</text>
      </g>
      <g transform="translate(0 172)">
        <rect width="1028" height="72" rx="14" fill="#f1f5f9"/>
        <text x="36" y="44" font-weight="800" fill="#0f172a">Support</text>
        <text x="290" y="44" fill="#166534">Ticket summary workflow</text>
        <text x="570" y="44" fill="#92400e">Customer data in secure model</text>
        <text x="850" y="44" fill="#991b1b">Consumer chat accounts</text>
      </g>
      <g transform="translate(0 258)">
        <rect width="1028" height="72" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="36" y="44" font-weight="800" fill="#0f172a">Finance</text>
        <text x="290" y="44" fill="#166534">Budget analysis workflow</text>
        <text x="570" y="44" fill="#92400e">Frontier model by approval</text>
        <text x="850" y="44" fill="#991b1b">Unapproved spreadsheet upload</text>
      </g>
    </g>
    <g transform="translate(86 590)" font-size="15" font-weight="700">
      <circle cx="12" cy="-5" r="7" fill="#16a34a"/><text x="28" y="0" fill="#334155">Approved</text>
      <circle cx="126" cy="-5" r="7" fill="#f59e0b"/><text x="142" y="0" fill="#334155">Conditional</text>
      <circle cx="260" cy="-5" r="7" fill="#ef4444"/><text x="276" y="0" fill="#334155">Blocked</text>
    </g>
  </g>
</svg>
